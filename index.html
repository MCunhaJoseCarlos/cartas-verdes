<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cartas Verdes — M. Cunha & Companhia</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #1a7a4a;
      --green2:  #25a865;
      --dark:    #0d1f14;
      --light:   #f4f9f6;
      --card:    #ffffff;
      --border:  #c8e6d4;
      --err:     #c0392b;
      --shadow:  0 8px 40px rgba(26,122,74,0.13);
    }

    body {
      min-height: 100vh;
      background: var(--light);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      color: var(--dark);
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 10% 0%, rgba(37,168,101,0.13) 0%, transparent 60%),
        radial-gradient(ellipse at 90% 100%, rgba(26,122,74,0.10) 0%, transparent 60%);
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 3rem 2.5rem 2.5rem;
      max-width: 480px;
      width: 100%;
      border: 1.5px solid var(--border);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--green), var(--green2));
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--green), var(--green2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 24px; height: 24px; }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--green);
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--dark);
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #4a7060;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--green);
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 1.25rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.9rem 1.1rem;
      font-size: 1.35rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 2px solid var(--border);
      border-radius: 12px;
      outline: none;
      color: var(--dark);
      background: var(--light);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--green2);
      box-shadow: 0 0 0 4px rgba(37,168,101,0.12);
      background: #fff;
    }

    input[type="text"].error {
      border-color: var(--err);
      box-shadow: 0 0 0 4px rgba(192,57,43,0.10);
    }

    .hint {
      font-size: 0.8rem;
      color: #7a9a87;
      margin-bottom: 1.5rem;
    }

    .hint span {
      background: #e8f5ee;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'Syne', sans-serif;
      font-size: 0.78rem;
      color: var(--green);
      margin: 0 2px;
    }

    .msg {
      font-size: 0.88rem;
      min-height: 1.4rem;
      margin-bottom: 1rem;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      display: none;
    }
    .msg.show { display: block; }
    .msg.err  { background: #fdecea; color: var(--err); }
    .msg.ok   { background: #e8f5ee; color: var(--green); }

    button {
      width: 100%;
      padding: 0.95rem;
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    button:hover  { opacity: 0.92; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .footer {
      margin-top: 2rem;
      font-size: 0.78rem;
      color: #9ab8a5;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="3" width="22" height="14" rx="2"/>
        <path d="M8 17v4M16 17v4M4 21h16"/>
        <circle cx="8.5" cy="10" r="1.5"/>
        <circle cx="15.5" cy="10" r="1.5"/>
      </svg>
    </div>
    <div class="logo-text">M. Cunha &amp; Companhia SA</div>
  </div>

  <h1>Carta Verde<br/>da sua viatura</h1>
  <p class="subtitle">Introduza a matrícula da viatura que lhe está atribuída para descarregar o documento.</p>

  <label for="matricula">Matrícula</label>
  <div class="input-wrap">
    <input type="text" id="matricula" placeholder="AA-00-AA" maxlength="8" autocomplete="off" autocorrect="off" spellcheck="false"/>
  </div>

  <p class="hint">
    Exemplos: <span>AA-89-JR</span> <span>97-AD-33</span> <span>05-54-TD</span>
  </p>

  <div class="msg" id="msg"></div>

  <button onclick="descarregar()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Descarregar Carta Verde
  </button>

  <p class="footer">Em caso de dúvida contacte os serviços administrativos.</p>
</div>

<script>
  const MATRICULA_RE = /^([A-Z]{2}-\d{2}-[A-Z]{2}|\d{2}-[A-Z]{2}-\d{2}|\d{2}-\d{2}-[A-Z]{2})$/i;

  // -----------------------------------------------------------------------
  // CONFIGURAÇÃO: pasta onde estão os PDFs (mesma pasta que o index.html)
  // Se os PDFs estiverem numa subpasta, altere para, ex: "pdfs/"
  // -----------------------------------------------------------------------
  const PDF_BASE = "pdfs/";

  const input = document.getElementById('matricula');
  const msg   = document.getElementById('msg');

  // Formata automaticamente enquanto escreve (insere traços)
  input.addEventListener('input', () => {
    let v = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    if (v.length > 2) v = v.slice(0,2) + '-' + v.slice(2);
    if (v.length > 5) v = v.slice(0,5) + '-' + v.slice(5);
    input.value = v.slice(0,8);
    input.classList.remove('error');
    showMsg('', '');
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') descarregar();
  });

  function showMsg(text, type) {
    msg.textContent = text;
    msg.className = 'msg' + (text ? ' show ' + type : '');
  }

  function descarregar() {
    const matricula = input.value.trim().toUpperCase();

    if (!MATRICULA_RE.test(matricula)) {
      input.classList.add('error');
      showMsg('Matrícula inválida. Use o formato AA-00-AA.', 'err');
      input.focus();
      return;
    }

    const url = PDF_BASE + matricula + '.pdf';

    // Tenta descarregar; se o ficheiro não existir, mostra erro
    fetch(url, { method: 'HEAD' })
      .then(r => {
        if (r.ok) {
          showMsg('Documento encontrado! O download vai iniciar.', 'ok');
          const a = document.createElement('a');
          a.href = url;
          a.download = matricula + '.pdf';
          a.click();
        } else {
          input.classList.add('error');
          showMsg('Documento não encontrado para a matrícula ' + matricula + '. Verifique a matrícula ou contacte os serviços.', 'err');
        }
      })
      .catch(() => {
        // Em GitHub Pages o fetch HEAD pode falhar por CORS; tenta download direto
        showMsg('A iniciar download...', 'ok');
        const a = document.createElement('a');
        a.href = url;
        a.download = matricula + '.pdf';
        a.click();
      });
  }
</script>
</body>
</html>
